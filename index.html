<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holiday Calendar — WCL Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script>
/* ====== CONFIG: แก้ตรงนี้ที่เดียว ====== */
const CONFIG = {
  SHEET_ID: '1cTrAqSIgMstGpPHNVJ8vt7D-MzIo5OKLX0C6cMJWo74',
  SHEET_NAME: 'All_Countries_Holiday',
  COL: { country: 0, name: 1, start: 2, end: 3 },
  MAX_LANES_MONTH: 4,
  TITLE: 'Holiday Calendar',
  SUBTITLE: 'WCL · Markets coverage'
};

/* ====== ชื่อประเทศ -> ISO2 (เพิ่มได้เรื่อย ๆ) ====== */
const ISO = {
  'australia':'AU','united states':'US','usa':'US','united kingdom':'GB','uk':'GB','england':'GB',
  'japan':'JP','singapore':'SG','malaysia':'MY','south korea':'KR','korea':'KR','north korea':'KP',
  'thailand':'TH','indonesia':'ID','philippines':'PH','vietnam':'VN','india':'IN','china':'CN',
  'hong kong':'HK','hongkong':'HK','macau':'MO','taiwan':'TW','new zealand':'NZ','canada':'CA','germany':'DE',
  'france':'FR','italy':'IT','spain':'ES','netherlands':'NL','switzerland':'CH','ireland':'IE',
  'sweden':'SE','norway':'NO','denmark':'DK','finland':'FI','austria':'AT','belgium':'BE',
  'portugal':'PT','poland':'PL','greece':'GR','czech republic':'CZ','hungary':'HU',
  'united arab emirates':'AE','uae':'AE','saudi arabia':'SA','qatar':'QA','kuwait':'KW',
  'bahrain':'BH','oman':'OM','israel':'IL','turkey':'TR','russia':'RU','brazil':'BR',
  'mexico':'MX','argentina':'AR','chile':'CL','south africa':'ZA','egypt':'EG',
  'myanmar':'MM','cambodia':'KH','laos':'LA','brunei':'BN','sri lanka':'LK',
  'bangladesh':'BD','pakistan':'PK','nepal':'NP','mongolia':'MN','maldives':'MV'
};

/* ====== สีล็อกประเทศหลัก (โทน muted) ที่เหลือ gen จากชื่อ ====== */
const PREF_COLOR = {
  'australia':'#5f8a63','united states':'#bb6e62','united kingdom':'#5f7cb8',
  'japan':'#8a6fae','singapore':'#3f9b97','malaysia':'#bb934f','south korea':'#bd7a90'
};
const MULTI_COLOR = '#5b6b7d';

/* ====== ทวีป (อ้างอิงด้วย ISO2) ====== */
const CONTINENT = {
  Asia:['JP','SG','MY','KR','KP','TH','ID','PH','VN','IN','CN','HK','MO','TW','MM','KH','LA','BN','LK','BD','PK','NP','MN','MV'],
  Oceania:['AU','NZ'],
  'North America':['US','CA','MX'],
  'South America':['BR','AR','CL'],
  Europe:['GB','DE','FR','IT','ES','NL','CH','IE','SE','NO','DK','FI','AT','BE','PT','PL','GR','CZ','HU','RU','TR'],
  'Middle East':['AE','SA','QA','KW','BH','OM','IL'],
  Africa:['ZA','EG']
};
function continentOf(code){ for(const r in CONTINENT){ if(CONTINENT[r].includes(code)) return r; } return 'Other'; }
</script>
<style>
:root{
  --bg:#10161c;
  --canvas:#161e26;
  --panel:#1d2730;
  --panel-2:#243039;
  --grid-line:#2b3a47;
  --grid-soft:#222e39;
  --ink:#e9eef3;
  --ink-dim:#93a4b3;
  --ink-faint:#627280;
  --accent:#5a96e8;
  --accent-deep:#21344d;
  --weekend:#131a20;
  --today:#16241d;
  --today-ring:#5cb98a;
  --radius:12px;
  --bargrad:rgba(255,255,255,.08);
}
:root[data-theme="light"]{
  --bg:#eef1f5;
  --canvas:#ffffff;
  --panel:#f1f4f8;
  --panel-2:#e7ecf2;
  --grid-line:#d4dce4;
  --grid-soft:#e4e9ef;
  --ink:#1a2530;
  --ink-dim:#5a6b7a;
  --ink-faint:#8a9aa8;
  --accent:#2f6fd0;
  --accent-deep:#2a4a72;
  --weekend:#f4f6f9;
  --today:#e6f4ec;
  --today-ring:#2e9c6a;
  --bargrad:rgba(0,0,0,.06);
}
:root[data-theme="light"] body{background:radial-gradient(1400px 700px at 88% -12%, rgba(47,111,208,.07), transparent 55%), var(--bg)}
:root[data-theme="light"] .dow div{color:#d4e0f0}
:root[data-theme="light"] .dow div.we{color:#b8c8de}
:root[data-theme="light"] .weekpanel header .wk{color:#cdddf2}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:radial-gradient(1400px 700px at 88% -12%, rgba(90,150,232,.06), transparent 55%), var(--bg);
  color:var(--ink);line-height:1.45;-webkit-font-smoothing:antialiased;padding:26px 22px 60px;
}
.shell{max-width:1340px;margin:0 auto}

/* ---------- Header ---------- */
.topbar{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:20px}
.brand{display:flex;flex-direction:column;gap:2px;margin-right:auto}
.brand .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600}
.brand h1{font-size:24px;font-weight:700;letter-spacing:-.015em;line-height:1.1}
.brand .sub{font-size:12px;color:var(--ink-faint)}
.nav{display:flex;align-items:center;gap:8px;position:relative}
.monthlabel{min-width:190px;text-align:center;font-size:18px;font-weight:600;letter-spacing:-.01em;padding:0 6px}
.monthlabel .yr{color:var(--ink-dim);font-weight:500}
button.ctl{
  font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);
  background:var(--panel);border:1px solid var(--grid-line);height:38px;padding:0 13px;border-radius:10px;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:background .14s,border-color .14s,transform .06s;user-select:none;
}
button.ctl:hover{background:var(--panel-2);border-color:#3a4b5a}
button.ctl:active{transform:translateY(1px)}
button.ctl.icon{width:38px;padding:0;justify-content:center;font-size:17px}
button.ctl.primary{background:var(--accent-deep);border-color:#2f4a6b}
button.ctl.primary:hover{background:#294366}
button.ctl:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
button.ctl .badge{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--accent);color:#08101a;border-radius:5px;padding:1px 5px;font-weight:600}
.monthpick input[type=month]{
  font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);
  background:var(--panel);border:1px solid var(--grid-line);height:38px;padding:0 10px;border-radius:10px;color-scheme:dark;cursor:pointer;
}

/* ---------- Filter dropdown ---------- */
.fwrap{position:relative}
.fpanel{
  position:absolute;top:46px;right:0;z-index:30;width:320px;
  background:var(--canvas);border:1px solid var(--grid-line);border-radius:12px;
  box-shadow:0 16px 44px rgba(0,0,0,.5);padding:12px;display:none;
}
.fpanel.show{display:block;animation:rise .16s ease}
.fpanel .fhead{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fpanel .fhead .t{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-right:auto}
.fpanel .fhead button{font-family:inherit;font-size:11.5px;font-weight:600;color:var(--accent);background:none;border:none;cursor:pointer;padding:3px 6px;border-radius:6px}
.fpanel .fhead button:hover{background:var(--panel)}
.fsearch{width:100%;font-family:inherit;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--grid-line);border-radius:8px;height:34px;padding:0 11px;margin-bottom:8px}
.fsearch::placeholder{color:var(--ink-faint)}
.fsearch:focus{outline:none;border-color:var(--accent)}
.fchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.fchip{font-family:inherit;font-size:11px;font-weight:600;color:var(--ink-dim);background:var(--panel);border:1px solid var(--grid-line);border-radius:20px;padding:4px 10px;cursor:pointer;transition:all .12s}
.fchip:hover{color:var(--ink);border-color:var(--accent);background:var(--panel-2)}
.flist{display:grid;grid-template-columns:1fr 1fr;gap:2px;max-height:280px;overflow-y:auto}
.fitem.hidden{display:none}
.fitem{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:12.5px}
.fitem:hover{background:var(--panel)}
.fitem input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.fitem .cd{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600}

/* ---------- Calendar ---------- */
.cal{background:var(--canvas);border:1px solid var(--grid-line);border-radius:var(--radius);overflow:hidden}
.dow{display:grid;grid-template-columns:repeat(7,1fr);background:var(--accent-deep)}
.dow div{padding:11px 14px;font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#bcccdf}
.dow div.we{color:#90a4bc}
.weekrow{position:relative;border-top:1px solid var(--grid-line)}
.weekrow:first-child{border-top:none}
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);position:absolute;inset:0;z-index:0}
.daycell{border-left:1px solid var(--grid-soft);padding:8px 10px;cursor:pointer;transition:background .1s}
.daycell:hover{background:var(--panel)}
.daycell.we:hover,.daycell.oom:hover,.daycell.today:hover{filter:brightness(1.08)}
.daycell:first-child{border-left:none}
.daycell.oom{background:rgba(0,0,0,.15)}
.daycell.we{background:var(--weekend)}
.daycell.today{background:var(--today)}
.daynum{font-size:14px;font-weight:600;color:var(--ink-dim);height:26px;display:flex;align-items:center}
.daycell.oom .daynum{color:var(--ink-faint);opacity:.55}
.daycell.today .daynum span{background:var(--today-ring);color:#05140d;font-weight:700;min-width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;padding:0 4px}
.events{position:relative;z-index:1;pointer-events:none}
.bar{
  position:absolute;display:flex;align-items:center;gap:6px;padding:0 9px;
  border-radius:7px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;
  pointer-events:auto;cursor:pointer;transition:filter .12s;
}
.bar:hover{filter:brightness(1.14) saturate(1.1)}
.bar.cont-l{border-top-left-radius:0;border-bottom-left-radius:0}
.bar.cont-r{border-top-right-radius:0;border-bottom-right-radius:0}
.bar .nm{overflow:hidden;text-overflow:ellipsis}
.bar .codes{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:10.5px;opacity:.85;letter-spacing:.02em;flex-shrink:0}
.bar .arrow{flex-shrink:0;opacity:.7;font-size:10px}
.more{
  position:absolute;height:20px;font-size:11px;font-weight:600;color:var(--ink-dim);
  background:var(--panel);border:1px solid var(--grid-line);border-radius:6px;
  display:flex;align-items:center;justify-content:center;pointer-events:auto;cursor:pointer;
}
.more:hover{color:var(--ink);background:var(--panel-2)}
.weekopen{
  position:absolute;top:7px;right:7px;z-index:2;width:24px;height:24px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink-faint);
  background:var(--panel);border:1px solid var(--grid-line);cursor:pointer;pointer-events:auto;opacity:0;transition:opacity .12s,color .12s;
}
.weekrow:hover .weekopen{opacity:1}
.weekopen:hover{color:var(--accent);border-color:#3a536f}

/* ---------- Legend ---------- */
.legend{margin-top:18px;display:flex;flex-wrap:wrap;gap:9px 18px;align-items:center;padding:15px 18px;background:var(--canvas);border:1px solid var(--grid-line);border-radius:var(--radius)}
.legend .ttl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-right:4px}
.lg{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500}
.lg .sw{width:12px;height:12px;border-radius:4px;flex-shrink:0}
.lg .cd{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;color:var(--ink-dim)}

/* ---------- Monthly summary ---------- */
.summary{margin-top:18px;background:var(--canvas);border:1px solid var(--grid-line);border-radius:var(--radius);overflow:hidden}
.summary .sh{display:flex;align-items:baseline;gap:10px;padding:16px 20px;border-bottom:1px solid var(--grid-line)}
.summary .sh h3{font-size:16px;font-weight:600;letter-spacing:-.01em}
.summary .sh .cnt{font-size:12.5px;color:var(--ink-faint)}
.sumgrid{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media (max-width:820px){.sumgrid{grid-template-columns:1fr}}
.sumrow{display:flex;align-items:center;gap:11px;padding:10px 20px;border-bottom:1px solid var(--grid-soft);font-size:13px}
.sumrow:hover{background:var(--panel)}
.sumgrid > .sumrow:nth-child(odd){border-right:1px solid var(--grid-soft)}
@media (max-width:820px){.sumgrid > .sumrow:nth-child(odd){border-right:none}}
.sumrow .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.sumrow .cd{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;min-width:26px;flex-shrink:0}
.sumrow .nm{font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sumrow .dates{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-dim);flex-shrink:0}
.sumrow .days{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--ink-faint);background:var(--panel-2);border-radius:5px;padding:2px 7px;flex-shrink:0;min-width:42px;text-align:center}
.sumempty{padding:26px 20px;text-align:center;color:var(--ink-faint);font-size:13px;font-style:italic}

/* ---------- Week detail ---------- */
.scrim{position:fixed;inset:0;background:rgba(7,11,15,.68);backdrop-filter:blur(3px);z-index:40;display:none;align-items:flex-start;justify-content:center;padding:44px 20px;overflow-y:auto}
.scrim.show{display:flex}
.weekpanel{width:100%;max-width:700px;background:var(--canvas);border:1px solid var(--grid-line);border-radius:16px;overflow:hidden;animation:rise .2s cubic-bezier(.2,.8,.2,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.weekpanel header{display:flex;align-items:center;gap:12px;padding:17px 22px;background:var(--accent-deep)}
.weekpanel header .wk{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#9fb6d8;font-weight:600}
.weekpanel header h2{font-size:18px;font-weight:600;letter-spacing:-.01em}
.weekpanel header button{margin-left:auto;background:rgba(255,255,255,.08);border:none;color:#fff;width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:16px}
.weekpanel header button:hover{background:rgba(255,255,255,.16)}
.weekbody{padding:8px 0 14px;max-height:64vh;overflow-y:auto}
.dayblock{padding:6px 22px}
.dayblock + .dayblock{border-top:1px solid var(--grid-soft)}
.dayblock .dh{display:flex;align-items:baseline;gap:10px;padding:9px 0 6px}
.dayblock .dh .dnum{font-size:15px;font-weight:700}
.dayblock .dh .dwd{font-size:12px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.dayblock.is-today .dh .dnum{color:var(--today-ring)}
.hrow{display:flex;align-items:center;gap:10px;padding:6px 0}
.hrow .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.hrow .cd{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;min-width:24px}
.hrow .cn{font-size:13px;color:var(--ink-dim);min-width:120px}
.hrow .hn{font-size:13.5px;font-weight:500}
.hrow .span{margin-left:auto;font-size:11px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace}
.emptyday{font-size:12.5px;color:var(--ink-faint);padding:4px 0 8px;font-style:italic}
.hrow2{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--grid-soft)}
.hrow2:last-child{border-bottom:none}
.hrow2 .dot{width:11px;height:11px;border-radius:3px;margin-top:4px;flex-shrink:0}
.hrow2 .hbody{display:flex;flex-direction:column;gap:3px}
.hrow2 .htop{display:flex;align-items:center;gap:9px}
.hrow2 .htop .cd{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11.5px}
.hrow2 .htop .cn{font-size:13px;color:var(--ink-dim)}
.hrow2 .hnm{font-size:15px;font-weight:600;letter-spacing:-.005em}
.hrow2 .hspan{font-size:12px;color:var(--ink-faint);font-family:'IBM Plex Mono',monospace}

/* ---------- Tooltip / states ---------- */
#tip{position:fixed;z-index:60;pointer-events:none;opacity:0;background:#0b1218;border:1px solid var(--grid-line);border-radius:10px;padding:10px 12px;max-width:270px;box-shadow:0 10px 34px rgba(0,0,0,.5);font-size:12px;transition:opacity .1s}
#tip .tn{font-weight:600;margin-bottom:3px}
#tip .tc{color:var(--ink-dim);font-size:11.5px}
#tip .td{color:var(--ink-faint);font-size:11px;margin-top:3px;font-family:'IBM Plex Mono',monospace}
.state{padding:64px 24px;text-align:center;color:var(--ink-dim)}
.state .big{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px}
.state code{font-family:'IBM Plex Mono',monospace;background:var(--panel);padding:2px 6px;border-radius:5px;font-size:12px;color:var(--accent)}
.spinner{width:30px;height:30px;border:3px solid var(--grid-line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 16px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.foot{margin-top:16px;font-size:11.5px;color:var(--ink-faint);text-align:center}
.foot b{color:var(--ink-dim);font-weight:600}
@media (max-width:760px){.cal,.summary{overflow-x:auto}.calinner{min-width:760px}.flist{grid-template-columns:1fr}}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="brand">
      <span class="eyebrow" id="eyebrow">WCL · Markets coverage</span>
      <h1 id="title">Holiday Calendar</h1>
      <span class="sub" id="freshness">—</span>
    </div>
    <div class="nav">
      <button class="ctl icon" id="prev" aria-label="Previous month">‹</button>
      <div class="monthlabel" id="monthlabel">—</div>
      <button class="ctl icon" id="next" aria-label="Next month">›</button>
      <button class="ctl primary" id="today">Today</button>
      <div class="monthpick"><input type="month" id="jump" aria-label="Jump to month"></div>
      <div class="fwrap">
        <button class="ctl" id="filterBtn">⚲ Filter <span class="badge" id="filterBadge">all</span></button>
        <div class="fpanel" id="filterPanel">
          <div class="fhead">
            <span class="t">Markets</span>
            <button id="fAll">Select all</button>
            <button id="fNone">Clear</button>
          </div>
          <input type="text" class="fsearch" id="fSearch" placeholder="Search country…" autocomplete="off">
          <div class="fchips" id="fChips"></div>
          <div class="flist" id="flist"></div>
        </div>
      </div>
      <button class="ctl icon" id="themeBtn" aria-label="Toggle light/dark" title="Toggle theme">◐</button>
      <button class="ctl" id="refresh">↻ Refresh</button>
    </div>
  </div>

  <div class="cal"><div class="calinner">
    <div class="dow" id="dow"></div>
    <div id="weeks"><div class="state"><div class="spinner"></div>Loading holidays from the sheet…</div></div>
  </div></div>

  <div class="legend" id="legend" style="display:none"></div>

  <div class="summary" id="summary" style="display:none">
    <div class="sh"><h3 id="sumTitle">—</h3><span class="cnt" id="sumCnt"></span></div>
    <div id="sumBody"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<div class="scrim" id="scrim">
  <div class="weekpanel" role="dialog" aria-modal="true">
    <header><div><div class="wk" id="wkEyebrow">Week</div><h2 id="wkTitle">—</h2></div><button id="wkClose" aria-label="Close">✕</button></header>
    <div class="weekbody" id="wkBody"></div>
  </div>
</div>
<div id="tip"></div>

<script>
/* ===== country style ===== */
function key(c){return(c||'').toString().toLowerCase().trim()}
function codeFor(c){const k=key(c);if(ISO[k])return ISO[k];const l=(c||'').replace(/[^A-Za-z]/g,'');return(l.substring(0,2)||'??').toUpperCase()}
function flagFor(c){const code=ISO[key(c)];if(!code)return'🏳️';return String.fromCodePoint(...[...code].map(ch=>0x1F1E6+ch.charCodeAt(0)-65))}
function colorFor(c){const k=key(c);if(PREF_COLOR[k])return PREF_COLOR[k];let h=0;for(let i=0;i<k.length;i++)h=(h*31+k.charCodeAt(i))>>>0;return hsl(h%360,42,48)}
function hsl(h,s,l){s/=100;l/=100;const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let r,g,b;if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}const f=v=>('0'+Math.round((v+m)*255).toString(16)).slice(-2);return'#'+f(r)+f(g)+f(b)}
function textOn(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const L=(0.2126*r+0.7152*g+0.0722*b)/255;return L>0.62?'#16201a':'#ffffff'}
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')'}
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')'}

/* ===== date helpers ===== */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];const DAY=86400000;
function ymd(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function addDays(d,n){return new Date(d.getFullYear(),d.getMonth(),d.getDate()+n)}
function sameDay(a,b){return a.getTime()===b.getTime()}
function daysBetween(a,b){return Math.round((ymd(b)-ymd(a))/DAY)}
function fmtShort(d){return d.getDate()+' '+MON[d.getMonth()]}
function fmtLong(d){return DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]+' '+d.getFullYear()}
function parseDate(v){if(v==null||v==='')return null;if(v instanceof Date)return ymd(v);const s=v.toString().trim();let m=s.match(/^Date\((\d+),(\d+),(\d+)/);if(m)return new Date(+m[1],+m[2],+m[3]);m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);if(m){let d=+m[1],mo=+m[2],y=+m[3];if(y<100)y+=2000;return new Date(y,mo-1,d)}const p=new Date(s);if(!isNaN(p))return ymd(p);return null}

/* ===== state ===== */
let HOLIDAYS=[];
let activeCountries=new Set();   // key(country)
let viewDate=new Date();viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth(),1);

function gvizUrl(){return`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}&headers=1`}
async function loadData(){
  const res=await fetch(gvizUrl());const txt=await res.text();
  const json=JSON.parse(txt.replace(/^[\s\S]*?setResponse\(/,'').replace(/\);?\s*$/,''));
  if(json.status==='error')throw new Error((json.errors&&json.errors[0]&&json.errors[0].detailed_message)||'gviz error');
  const rows=json.table.rows||[];const out=[];
  rows.forEach(r=>{const c=r.c||[];const cell=i=>c[i]?(c[i].v!=null?c[i].v:(c[i].f!=null?c[i].f:'')):'';
    const country=(cell(CONFIG.COL.country)||'').toString().trim();const name=(cell(CONFIG.COL.name)||'').toString().trim();
    if(!country||!name)return;const start=parseDate(cell(CONFIG.COL.start));if(!start)return;
    let end=parseDate(cell(CONFIG.COL.end))||start;if(end<start)end=start;
    out.push({country,name,start,end,code:codeFor(country),color:colorFor(country),flag:flagFor(country)});});
  HOLIDAYS=out;
  const all=[...new Set(HOLIDAYS.map(h=>key(h.country)))];
  if(activeCountries.size===0) all.forEach(k=>activeCountries.add(k));
  buildFilter();
}
function visible(){return HOLIDAYS.filter(h=>activeCountries.has(key(h.country)))}

/* ===== month grid ===== */
function buildWeeks(monthDate){
  const y=monthDate.getFullYear(),m=monthDate.getMonth();
  const firstW=new Date(y,m,1).getDay();const dim=new Date(y,m+1,0).getDate();
  const nWeeks=Math.ceil((firstW+dim)/7);const gridStart=new Date(y,m,1-firstW);
  const weeks=[];for(let i=0;i<nWeeks;i++){const days=[];for(let j=0;j<7;j++)days.push(addDays(gridStart,i*7+j));weeks.push(days)}return weeks;
}
function eventsForWeek(weekDays,source){
  const wkStart=weekDays[0],wkEnd=weekDays[6];
  // 1) group ตาม "ชื่อวันหยุด" (ไม่สนช่วงวัน)
  const byName={};
  source.forEach(h=>{ if(h.end<wkStart||h.start>wkEnd)return;
    const nk=h.name.toLowerCase().trim();
    (byName[nk]=byName[nk]||{name:h.name,items:[]}).items.push(h); });

  const evs=[];
  Object.values(byName).forEach(grp=>{
    // 2) แต่ละวันในสัปดาห์ หาว่ามีประเทศไหน active บ้าง (ของชื่อวันหยุดนี้)
    const perDay=[];
    for(let c=0;c<7;c++){
      const d=weekDays[c];
      const seen={},uniq=[];
      grp.items.forEach(h=>{ if(d>=h.start&&d<=h.end&&!seen[h.code]){seen[h.code]=1;
        uniq.push({country:h.country,code:h.code,color:h.color,flag:h.flag,start:h.start,end:h.end});} });
      uniq.sort((a,b)=>a.code.localeCompare(b.code));
      perDay[c]=uniq;
    }
    // 3) รวมวันที่ติดกันที่มีอย่างน้อย 1 ประเทศ เป็นแท่งเดียว (list ประเทศทั้งหมดใน run)
    let c=0;
    while(c<7){
      if(perDay[c].length===0){c++;continue;}
      let end=c;
      while(end+1<7 && perDay[end+1].length>0) end++;
      const seen={},countries=[];
      for(let k=c;k<=end;k++) perDay[k].forEach(x=>{ if(!seen[x.code]){seen[x.code]=1;countries.push(x);} });
      countries.sort((a,b)=>a.code.localeCompare(b.code));
      const contL=c===0   && countries.some(x=>x.start<wkStart);
      const contR=end===6 && countries.some(x=>x.end>wkEnd);
      const minStart=new Date(Math.min(...countries.map(x=>x.start.getTime())));
      const maxEnd  =new Date(Math.max(...countries.map(x=>x.end.getTime())));
      evs.push({
        name:grp.name, colStart:c, colEnd:end,
        countries:countries.map(x=>({country:x.country,code:x.code,color:x.color,flag:x.flag})),
        contL, contR, multi:countries.length>1,
        color:countries.length>1?MULTI_COLOR:countries[0].color,
        start:minStart, end:maxEnd, span:daysBetween(minStart,maxEnd)+1
      });
      c=end+1;
    }
  });
  // 4) lane packing
  evs.sort((a,b)=>a.colStart-b.colStart||(b.colEnd-b.colStart)-(a.colEnd-a.colStart)||a.name.localeCompare(b.name));
  const laneEnds=[];evs.forEach(e=>{let lane=0;while(lane<laneEnds.length&&laneEnds[lane]>=e.colStart)lane++;laneEnds[lane]=e.colEnd;e.lane=lane;});
  return evs;
}

const DAYNUM_OFFSET=38, LANE_H=30, BAR_H=25;

function render(){
  document.getElementById('title').textContent=CONFIG.TITLE;
  document.getElementById('eyebrow').textContent=CONFIG.SUBTITLE;
  document.getElementById('monthlabel').innerHTML=MONTHS[viewDate.getMonth()]+' <span class="yr">'+viewDate.getFullYear()+'</span>';
  document.getElementById('jump').value=viewDate.getFullYear()+'-'+String(viewDate.getMonth()+1).padStart(2,'0');

  const dow=document.getElementById('dow');dow.innerHTML='';
  DOW.forEach((d,i)=>{const el=document.createElement('div');el.textContent=d;if(i===0||i===6)el.className='we';dow.appendChild(el)});

  const src=visible();
  const weeks=buildWeeks(viewDate);const today=ymd(new Date());
  const host=document.getElementById('weeks');host.innerHTML='';
  const MAX=CONFIG.MAX_LANES_MONTH;

  weeks.forEach((days,wi)=>{
    const evs=eventsForWeek(days,src);
    const maxLane=evs.reduce((mx,e)=>Math.max(mx,e.lane),-1);
    const shownLanes=Math.min(maxLane+1,MAX);
    const overflow=maxLane+1>MAX;
    const rowH=DAYNUM_OFFSET+Math.max(shownLanes,1)*LANE_H+(overflow?22:8);

    const wr=document.createElement('div');wr.className='weekrow';wr.style.minHeight=rowH+'px';
    const dg=document.createElement('div');dg.className='daygrid';
    days.forEach((d,ci)=>{const cell=document.createElement('div');cell.className='daycell';
      if(d.getMonth()!==viewDate.getMonth())cell.classList.add('oom');
      if(d.getDay()===0||d.getDay()===6)cell.classList.add('we');
      const isToday=sameDay(d,today);if(isToday)cell.classList.add('today');
      cell.innerHTML='<div class="daynum"><span>'+d.getDate()+'</span></div>';
      cell.addEventListener('click',()=>openDay(d));dg.appendChild(cell);});
    wr.appendChild(dg);

    const ev=document.createElement('div');ev.className='events';ev.style.height=rowH+'px';
    const colW=100/7;
    evs.filter(e=>e.lane<MAX).forEach(e=>{
      const bar=document.createElement('div');bar.className='bar'+(e.contL?' cont-l':'')+(e.contR?' cont-r':'');
      bar.style.left='calc('+(e.colStart*colW)+'% + 3px)';
      bar.style.width='calc('+((e.colEnd-e.colStart+1)*colW)+'% - 6px)';
      bar.style.top=(DAYNUM_OFFSET+e.lane*LANE_H)+'px';bar.style.height=BAR_H+'px';
      bar.style.background=hexA(e.color,.82);bar.style.color=textOn(e.color);
      const codes=e.countries.map(x=>x.code).join(' ');
      bar.innerHTML=(e.contL?'<span class="arrow">◂</span>':'')+'<span class="nm">'+esc(e.name)+'</span><span class="codes">'+esc(codes)+'</span>'+(e.contR?'<span class="arrow">▸</span>':'');
      attachTip(bar,e);
      bar.addEventListener('click',ev2=>{const r=ev.getBoundingClientRect();let col=Math.floor((ev2.clientX-r.left)/r.width*7);col=Math.max(0,Math.min(6,col));openDay(days[col]);});
      ev.appendChild(bar);
    });
    if(overflow){for(let col=0;col<7;col++){const hidden=evs.filter(e=>e.lane>=MAX&&e.colStart<=col&&e.colEnd>=col).length;
      if(hidden>0){const more=document.createElement('div');more.className='more';
        more.style.left='calc('+(col*colW)+'% + 3px)';more.style.width='calc('+colW+'% - 6px)';more.style.top=(DAYNUM_OFFSET+MAX*LANE_H)+'px';
        more.textContent='+'+hidden+' more';more.addEventListener('click',()=>openDay(days[col]));ev.appendChild(more);}}}
    wr.appendChild(ev);
    const open=document.createElement('div');open.className='weekopen';open.textContent='⤢';open.title='Open week detail';
    open.addEventListener('click',()=>openWeek(wi,days));wr.appendChild(open);
    host.appendChild(wr);
  });

  renderLegend(src);
  renderSummary(src);
  const f=document.getElementById('freshness');
  f.textContent='Updated '+new Date().toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

function monthHolidays(src){
  const ms=new Date(viewDate.getFullYear(),viewDate.getMonth(),1);
  const me=new Date(viewDate.getFullYear(),viewDate.getMonth()+1,0);
  return src.filter(h=>h.end>=ms&&h.start<=me);
}

function renderLegend(src){
  const lg=document.getElementById('legend');
  const inMonth=monthHolidays(src);
  const set=[...new Set(inMonth.map(h=>h.country))].sort();
  if(!set.length){lg.style.display='none';return}
  lg.style.display='flex';
  lg.innerHTML='<span class="ttl">'+set.length+' active this month</span>'+set.map(c=>{
    const col=colorFor(c),code=codeFor(c),flag=flagFor(c);
    return'<span class="lg"><span class="sw" style="background:'+col+'"></span><span class="cd">'+code+'</span>'+flag+' '+esc(c)+'</span>';}).join('');
}

function renderSummary(src){
  const sm=document.getElementById('summary');
  const inMonth=monthHolidays(src).slice().sort((a,b)=>a.start-b.start||a.country.localeCompare(b.country)||a.name.localeCompare(b.name));
  document.getElementById('sumTitle').textContent=MONTHS[viewDate.getMonth()]+' '+viewDate.getFullYear()+' · holidays';
  document.getElementById('sumCnt').textContent=inMonth.length+' records · '+new Set(inMonth.map(h=>h.country)).size+' markets';
  const body=document.getElementById('sumBody');
  sm.style.display='block';
  if(!inMonth.length){body.innerHTML='<div class="sumempty">No holidays this month for the selected markets.</div>';return}
  body.innerHTML='<div class="sumgrid">'+inMonth.map(h=>{
    const span=daysBetween(h.start,h.end)+1;
    const dates=span>1?fmtShort(h.start)+' – '+fmtShort(h.end):fmtShort(h.start);
    return'<div class="sumrow"><span class="dot" style="background:'+h.color+'"></span>'+
      '<span class="cd" style="color:'+h.color+'">'+h.code+'</span>'+
      '<span class="nm">'+h.flag+' '+esc(h.name)+'</span>'+
      '<span class="dates">'+dates+'</span>'+
      '<span class="days">'+span+'d</span></div>';}).join('')+'</div>';
  document.getElementById('foot').innerHTML=HOLIDAYS.length+' total records · sheet <b>'+esc(CONFIG.SHEET_NAME)+'</b>';
}

/* ===== filter ===== */
function buildFilter(){
  const all=[...new Set(HOLIDAYS.map(h=>h.country))].sort();
  // continent quick-select chips (เฉพาะทวีปที่มีประเทศใน data จริง)
  const byCont={};
  all.forEach(c=>{const r=continentOf(codeFor(c));(byCont[r]=byCont[r]||[]).push(key(c))});
  const chips=document.getElementById('fChips');
  chips.innerHTML=Object.keys(byCont).sort().map(r=>'<button class="fchip" data-r="'+esc(r)+'">'+esc(r)+' ('+byCont[r].length+')</button>').join('');
  chips.querySelectorAll('.fchip').forEach(btn=>btn.addEventListener('click',()=>{
    const ks=byCont[btn.dataset.r];
    const allOn=ks.every(k=>activeCountries.has(k));
    ks.forEach(k=>{ if(allOn) activeCountries.delete(k); else activeCountries.add(k); }); // toggle ทั้งทวีป
    buildFilter();render();
  }));
  // country checkbox list
  const list=document.getElementById('flist');
  list.innerHTML=all.map(c=>{const k=key(c),col=colorFor(c),code=codeFor(c),flag=flagFor(c);
    return'<label class="fitem" data-name="'+esc(c.toLowerCase())+'" data-code="'+esc(code.toLowerCase())+'"><input type="checkbox" data-c="'+esc(k)+'" '+(activeCountries.has(k)?'checked':'')+'>'+
      '<span class="cd" style="color:'+col+'">'+code+'</span><span>'+flag+' '+esc(c)+'</span></label>';}).join('');
  list.querySelectorAll('input').forEach(inp=>inp.addEventListener('change',()=>{
    const k=inp.dataset.c;if(inp.checked)activeCountries.add(k);else activeCountries.delete(k);updateBadge();render();}));
  applySearch();
  updateBadge();
}
function applySearch(){
  const q=(document.getElementById('fSearch').value||'').toLowerCase().trim();
  document.querySelectorAll('#flist .fitem').forEach(it=>{
    const hit=!q||it.dataset.name.includes(q)||it.dataset.code.includes(q);
    it.classList.toggle('hidden',!hit);
  });
}
function updateBadge(){
  const total=new Set(HOLIDAYS.map(h=>key(h.country))).size;
  const b=document.getElementById('filterBadge');
  b.textContent=(activeCountries.size>=total)?'all':activeCountries.size+'/'+total;
}

/* ===== week detail ===== */
function openWeek(wi,days){
  const today=ymd(new Date());const src=visible();
  document.getElementById('wkEyebrow').textContent='Week '+(wi+1);
  document.getElementById('wkTitle').textContent=fmtShort(days[0])+' – '+fmtLong(days[6]);
  const body=document.getElementById('wkBody');let html='';
  days.forEach(d=>{const occ=[];src.forEach(h=>{if(d>=h.start&&d<=h.end)occ.push(h)});
    occ.sort((a,b)=>a.country.localeCompare(b.country));const isToday=sameDay(d,today);
    html+='<div class="dayblock'+(isToday?' is-today':'')+'"><div class="dh"><span class="dnum">'+d.getDate()+' '+MON[d.getMonth()]+'</span><span class="dwd">'+DOW[d.getDay()]+'</span></div>';
    if(!occ.length){html+='<div class="emptyday">No holidays</div>';}
    else{occ.forEach(h=>{const span=daysBetween(h.start,h.end)+1;let spanTxt='';
      if(span>1){const idx=daysBetween(h.start,d)+1;spanTxt=fmtShort(h.start)+'–'+fmtShort(h.end)+' · '+idx+'/'+span;}
      html+='<div class="hrow"><span class="dot" style="background:'+h.color+'"></span><span class="cd" style="color:'+h.color+'">'+h.code+'</span><span class="cn">'+h.flag+' '+esc(h.country)+'</span><span class="hn">'+esc(h.name)+'</span>'+(spanTxt?'<span class="span">'+spanTxt+'</span>':'')+'</div>';});}
    html+='</div>';});
  body.innerHTML=html;document.getElementById('scrim').classList.add('show');
}
function closeWeek(){document.getElementById('scrim').classList.remove('show')}

/* ===== day detail (คลิกที่วัน) ===== */
function openDay(d){
  const src=visible();const occ=[];
  src.forEach(h=>{ if(d>=h.start&&d<=h.end) occ.push(h); });
  occ.sort((a,b)=>a.country.localeCompare(b.country)||a.name.localeCompare(b.name));
  const isToday=sameDay(d,ymd(new Date()));
  document.getElementById('wkEyebrow').textContent=DOW[d.getDay()]+(isToday?' · today':' · holidays');
  document.getElementById('wkTitle').textContent=d.getDate()+' '+MON[d.getMonth()]+' '+d.getFullYear();
  const body=document.getElementById('wkBody');
  if(!occ.length){
    body.innerHTML='<div class="dayblock"><div class="emptyday">No holidays on this day.</div></div>';
  }else{
    body.innerHTML='<div class="dayblock">'+occ.map(h=>{
      const span=daysBetween(h.start,h.end)+1, idx=daysBetween(h.start,d)+1;
      const spanTxt=span>1?(fmtLong(h.start)+'  →  '+fmtLong(h.end)+'  ·  day '+idx+' of '+span):'Single-day holiday';
      return '<div class="hrow2"><span class="dot" style="background:'+h.color+'"></span>'+
        '<div class="hbody"><div class="htop"><span class="cd" style="color:'+h.color+'">'+h.code+'</span>'+
        '<span class="cn">'+h.flag+' '+esc(h.country)+'</span></div>'+
        '<div class="hnm">'+esc(h.name)+'</div><div class="hspan">'+spanTxt+'</div></div></div>';
    }).join('')+'</div>';
  }
  document.getElementById('scrim').classList.add('show');
}

/* ===== tooltip ===== */
const tip=document.getElementById('tip');
function attachTip(el,e){el.addEventListener('mousemove',ev=>{
  const codes=e.countries.map(c=>c.flag+' '+c.country).join(', ');
  const span=e.span>1?fmtShort(e.start)+' – '+fmtShort(e.end)+' ('+e.span+' days)':fmtLong(e.start);
  tip.innerHTML='<div class="tn">'+esc(e.name)+'</div><div class="tc">'+esc(codes)+'</div><div class="td">'+span+'</div>';
  tip.style.opacity='1';let x=ev.clientX+14,y=ev.clientY+14;const r=tip.getBoundingClientRect();
  if(x+r.width>innerWidth-10)x=ev.clientX-r.width-14;if(y+r.height>innerHeight-10)y=ev.clientY-r.height-14;
  tip.style.left=x+'px';tip.style.top=y+'px';});
  el.addEventListener('mouseleave',()=>{tip.style.opacity='0'});}

function esc(s){return(s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

document.getElementById('prev').onclick=()=>go(-1);
document.getElementById('next').onclick=()=>go(1);
document.getElementById('today').onclick=()=>{const n=new Date();viewDate=new Date(n.getFullYear(),n.getMonth(),1);render()};
document.getElementById('jump').onchange=e=>{const m=e.target.value.match(/^(\d{4})-(\d{2})$/);if(m){viewDate=new Date(+m[1],+m[2]-1,1);render()}};
document.getElementById('refresh').onclick=async()=>{const btn=document.getElementById('refresh');btn.textContent='↻ Loading…';try{await loadData();render()}catch(err){showError(err)}btn.textContent='↻ Refresh'};

document.getElementById('filterPanel').onclick=e=>e.stopPropagation();
document.addEventListener('click',()=>document.getElementById('filterPanel').classList.remove('show'));
document.getElementById('fAll').onclick=()=>{HOLIDAYS.forEach(h=>activeCountries.add(key(h.country)));buildFilter();render()};
document.getElementById('fNone').onclick=()=>{activeCountries.clear();buildFilter();render()};

document.getElementById('fSearch').addEventListener('click',e=>e.stopPropagation());

/* ===== theme ===== */
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=(t==='light')?'☾':'◐';
  try{localStorage.setItem('holcal-theme',t)}catch(e){}
}
document.getElementById('themeBtn').onclick=()=>{
  const cur=document.documentElement.getAttribute('data-theme')==='light'?'light':'dark';
  applyTheme(cur==='light'?'dark':'light');
};
(function initTheme(){let t='dark';try{t=localStorage.getItem('holcal-theme')||'dark'}catch(e){}applyTheme(t)})();
document.getElementById('wkClose').onclick=closeWeek;
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeWeek()});
document.addEventListener('keydown',e=>{const open=document.getElementById('scrim').classList.contains('show');
  if(e.key==='Escape')closeWeek();else if(e.key==='ArrowLeft'&&!open)go(-1);else if(e.key==='ArrowRight'&&!open)go(1);});

function showError(err){document.getElementById('weeks').innerHTML='<div class="state"><div class="big">Couldn\'t load the sheet</div>Check <code>SHEET_ID</code> / <code>SHEET_NAME</code> and that the sheet is shared as <b>Anyone with the link → Viewer</b>.<br><br><code>'+esc(err.message||err)+'</code></div>';document.getElementById('legend').style.display='none';document.getElementById('summary').style.display='none'}

(async function init(){try{await loadData();render()}catch(err){showError(err)}})();
</script>
</body>
</html>
