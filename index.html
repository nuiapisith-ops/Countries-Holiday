<script>
/* ====== CONFIG: แก้ตรงนี้ที่เดียว ====== */
const CONFIG = {
  // ID ของไฟล์ Google Sheet (เอาจาก URL ระหว่าง /d/ ... /edit)
  SHEET_ID: '1cTrAqSIgMstGpPHNVJ8vt7D-MzIo5OKLX0C6cMJWo74',
  // ชื่อแท็บที่เก็บข้อมูลวันหยุด
  SHEET_NAME: 'All_Countries_Holiday',
  // คอลัมน์ (เริ่มนับ 0): A=country, B=holiday name, C=start, D=end
  COL: { country: 0, name: 1, start: 2, end: 3 },
  MAX_LANES_MONTH: 3,   // จำนวนแท่งสูงสุดต่อช่องในหน้า Month เกินนี้ขึ้น "+N"
  TITLE: 'Holiday Calendar',
  SUBTITLE: 'WCL · Markets coverage'
};

/* ====== ชื่อประเทศ -> ISO2 (เพิ่มได้เรื่อย ๆ) ====== */
const ISO = {
  'australia':'AU','united states':'US','usa':'US','united kingdom':'GB','uk':'GB','england':'GB',
  'japan':'JP','singapore':'SG','malaysia':'MY','south korea':'KR','korea':'KR','north korea':'KP',
  'thailand':'TH','indonesia':'ID','philippines':'PH','vietnam':'VN','india':'IN','china':'CN',
  'hong kong':'HK','hongkong':'HK','macau':'MO','taiwan':'TW','new zealand':'NZ','canada':'CA','germany':'DE',
  'france':'FR','italy':'IT','spain':'ES','netherlands':'NL','switzerland':'CH','ireland':'IE',
  'sweden':'SE','norway':'NO','denmark':'DK','finland':'FI','austria':'AT','belgium':'BE',
  'portugal':'PT','poland':'PL','greece':'GR','czech republic':'CZ','hungary':'HU',
  'united arab emirates':'AE','uae':'AE','saudi arabia':'SA','qatar':'QA','kuwait':'KW',
  'bahrain':'BH','oman':'OM','israel':'IL','turkey':'TR','russia':'RU','brazil':'BR',
  'mexico':'MX','argentina':'AR','chile':'CL','south africa':'ZA','egypt':'EG',
  'myanmar':'MM','cambodia':'KH','laos':'LA','brunei':'BN','sri lanka':'LK',
  'bangladesh':'BD','pakistan':'PK','nepal':'NP','mongolia':'MN','maldives':'MV'
};

/* ====== สีล็อกประเทศหลัก ที่เหลือ gen จากชื่อ (คงที่) ====== */
const PREF_COLOR = {
  'australia':'#1B7F3B','united states':'#C0392B','united kingdom':'#1F4FB0',
  'japan':'#7B3FB5','singapore':'#0F8A8A','malaysia':'#B7791F','south korea':'#9D174D'
};
const MULTI_COLOR = '#475569'; // วันหยุดที่หลายประเทศหยุดพร้อมกัน
</script>

<script>
/* ===================== country style ===================== */
function key(c){ return (c||'').toString().toLowerCase().trim(); }
function codeFor(c){
  const k = key(c); if (ISO[k]) return ISO[k];
  const letters = (c||'').replace(/[^A-Za-z]/g,'');
  return (letters.substring(0,2) || '??').toUpperCase();
}
function flagFor(c){
  const code = ISO[key(c)];
  if (!code) return '🏳️';
  return String.fromCodePoint(...[...code].map(ch=>0x1F1E6 + ch.charCodeAt(0)-65));
}
function colorFor(c){
  const k = key(c);
  if (PREF_COLOR[k]) return PREF_COLOR[k];
  let h=0; for(let i=0;i<k.length;i++) h=(h*31+k.charCodeAt(i))>>>0;
  return hsl(h%360,62,36);
}
function hsl(h,s,l){
  s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}
  else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}
  const f=v=>('0'+Math.round((v+m)*255).toString(16)).slice(-2);
  return '#'+f(r)+f(g)+f(b);
}

/* ===================== date helpers ===================== */
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY=86400000;
function ymd(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function addDays(d,n){return new Date(d.getFullYear(),d.getMonth(),d.getDate()+n)}
function sameDay(a,b){return a.getTime()===b.getTime()}
function daysBetween(a,b){return Math.round((ymd(b)-ymd(a))/DAY)}
function fmtShort(d){return d.getDate()+' '+MON[d.getMonth()]}
function fmtLong(d){return DOW[d.getDay()]+' '+d.getDate()+' '+MON[d.getMonth()]+' '+d.getFullYear()}

// parse a cell value into a local Date (handles gviz "Date(y,m,d)" and d/m/yy text)
function parseDate(v){
  if(v==null||v==='') return null;
  if(v instanceof Date) return ymd(v);
  const s=v.toString().trim();
  let m=s.match(/^Date\((\d+),(\d+),(\d+)/); // gviz date: month 0-indexed
  if(m) return new Date(+m[1],+m[2],+m[3]);
  m=s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/); // d/m/yy
  if(m){let d=+m[1],mo=+m[2],y=+m[3];if(y<100)y+=2000;return new Date(y,mo-1,d)}
  const p=new Date(s); if(!isNaN(p)) return ymd(p);
  return null;
}

/* ===================== fetch sheet ===================== */
let HOLIDAYS=[];      // {country,name,start,end,code,color,flag}
let viewDate=new Date();
viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth(),1);

function gvizUrl(){
  return `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq`+
         `?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}&headers=1`;
}
async function loadData(){
  const res=await fetch(gvizUrl());
  const txt=await res.text();
  const json=JSON.parse(txt.replace(/^[\s\S]*?setResponse\(/,'').replace(/\);?\s*$/,''));
  if(json.status==='error') throw new Error((json.errors&&json.errors[0]&&json.errors[0].detailed_message)||'gviz error');
  const rows=json.table.rows||[];
  const out=[];
  rows.forEach(r=>{
    const c=r.c||[];
    const cell=i=>c[i]?(c[i].v!=null?c[i].v:(c[i].f!=null?c[i].f:'')):'';
    const country=(cell(CONFIG.COL.country)||'').toString().trim();
    const name=(cell(CONFIG.COL.name)||'').toString().trim();
    if(!country||!name) return;
    const start=parseDate(cell(CONFIG.COL.start)); if(!start) return;
    let end=parseDate(cell(CONFIG.COL.end))||start;
    if(end<start) end=start;
    out.push({country,name,start,end,code:codeFor(country),color:colorFor(country),flag:flagFor(country)});
  });
  HOLIDAYS=out;
}

/* ===================== month grid ===================== */
function buildWeeks(monthDate){
  const y=monthDate.getFullYear(),m=monthDate.getMonth();
  const firstW=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const nWeeks=Math.ceil((firstW+dim)/7);
  const gridStart=new Date(y,m,1-firstW);
  const weeks=[];
  for(let i=0;i<nWeeks;i++){
    const days=[];
    for(let j=0;j<7;j++) days.push(addDays(gridStart,i*7+j));
    weeks.push(days);
  }
  return weeks;
}

// merge holidays that share name+start+end across countries into one event
function eventsForWeek(weekDays){
  const wkStart=weekDays[0], wkEnd=weekDays[6];
  const merged={};
  HOLIDAYS.forEach(h=>{
    if(h.end<wkStart||h.start>wkEnd) return; // not in this week
    const k=h.name.toLowerCase()+'|'+h.start.getTime()+'|'+h.end.getTime();
    if(!merged[k]) merged[k]={name:h.name,start:h.start,end:h.end,countries:[]};
    if(!merged[k].countries.some(x=>x.code===h.code))
      merged[k].countries.push({country:h.country,code:h.code,color:h.color,flag:h.flag});
  });
  const evs=Object.values(merged).map(e=>{
    e.countries.sort((a,b)=>a.code.localeCompare(b.code));
    const segStart=e.start<wkStart?wkStart:e.start;
    const segEnd=e.end>wkEnd?wkEnd:e.end;
    e.colStart=daysBetween(wkStart,segStart);
    e.colEnd=daysBetween(wkStart,segEnd);
    e.contL=e.start<wkStart;
    e.contR=e.end>wkEnd;
    e.multi=e.countries.length>1;
    e.color=e.multi?MULTI_COLOR:e.countries[0].color;
    e.span=daysBetween(e.start,e.end)+1;
    return e;
  });
  // lane packing: sort by colStart, then longer first
  evs.sort((a,b)=> a.colStart-b.colStart || (b.colEnd-b.colStart)-(a.colEnd-a.colStart) || a.name.localeCompare(b.name));
  const laneEnds=[];
  evs.forEach(e=>{
    let lane=0;
    while(lane<laneEnds.length && laneEnds[lane]>=e.colStart) lane++;
    laneEnds[lane]=e.colEnd;
    e.lane=lane;
  });
  return evs;
}

function render(){
  document.getElementById('title').textContent=CONFIG.TITLE;
  document.getElementById('eyebrow').textContent=CONFIG.SUBTITLE;
  document.getElementById('monthlabel').innerHTML=
    MONTHS[viewDate.getMonth()]+' <span class="yr">'+viewDate.getFullYear()+'</span>';
  document.getElementById('jump').value=
    viewDate.getFullYear()+'-'+String(viewDate.getMonth()+1).padStart(2,'0');

  // day-of-week header
  const dow=document.getElementById('dow');
  dow.innerHTML='';
  DOW.forEach((d,i)=>{const el=document.createElement('div');el.textContent=d;if(i===0||i===6)el.className='we';dow.appendChild(el)});

  const weeks=buildWeeks(viewDate);
  const today=ymd(new Date());
  const host=document.getElementById('weeks');
  host.innerHTML='';

  const MAX=CONFIG.MAX_LANES_MONTH;
  const laneH=24, barH=22, gap=2;

  weeks.forEach((days,wi)=>{
    const evs=eventsForWeek(days);
    const maxLane=evs.reduce((mx,e)=>Math.max(mx,e.lane),-1);
    const shownLanes=Math.min(maxLane+1,MAX);
    const rowH = (24+6) /*daynum pad*/ + Math.max(shownLanes,1)*laneH + 10;

    const wr=document.createElement('div');
    wr.className='weekrow';
    wr.style.minHeight=rowH+'px';

    // background day cells
    const dg=document.createElement('div');dg.className='daygrid';
    days.forEach(d=>{
      const cell=document.createElement('div');
      cell.className='daycell';
      const oom=d.getMonth()!==viewDate.getMonth();
      const we=d.getDay()===0||d.getDay()===6;
      if(oom)cell.classList.add('oom');
      if(we)cell.classList.add('we');
      if(sameDay(d,today))cell.classList.add('today');
      const isToday=sameDay(d,today);
      cell.innerHTML='<div class="daynum"><span class="'+(isToday?'n':'')+'">'+d.getDate()+'</span></div>';
      dg.appendChild(cell);
    });
    wr.appendChild(dg);

    // events overlay
    const ev=document.createElement('div');ev.className='events';
    ev.style.height=rowH+'px';
    const colW=100/7;

    evs.filter(e=>e.lane<MAX).forEach(e=>{
      const bar=document.createElement('div');
      bar.className='bar'+(e.contL?' cont-l':'')+(e.contR?' cont-r':'');
      bar.style.left=(e.colStart*colW)+'%';
      bar.style.width=((e.colEnd-e.colStart+1)*colW)+'%';
      bar.style.top=(e.lane*laneH)+'px';
      bar.style.background=e.color;
      const codes=e.countries.map(x=>x.code).join(' ');
      bar.innerHTML=
        (e.contL?'<span class="arrow">◂</span>':'')+
        '<span class="nm">'+esc(e.name)+'</span>'+
        '<span class="codes">'+esc(codes)+'</span>'+
        (e.contR?'<span class="arrow">▸</span>':'');
      attachTip(bar,e);
      bar.addEventListener('click',()=>openWeek(wi,days));
      ev.appendChild(bar);
    });

    // "+N more" per day column for hidden lanes
    if(maxLane+1>MAX){
      for(let col=0;col<7;col++){
        const hidden=evs.filter(e=>e.lane>=MAX && e.colStart<=col && e.colEnd>=col).length;
        if(hidden>0){
          const more=document.createElement('div');
          more.className='more';
          more.style.left=(col*colW)+'%';
          more.style.width=colW+'%';
          more.style.top=(MAX*laneH)+'px';
          more.textContent='+'+hidden+' more';
          more.addEventListener('click',()=>openWeek(wi,days));
          ev.appendChild(more);
        }
      }
    }

    wr.appendChild(ev);

    // open-week affordance
    const open=document.createElement('div');
    open.className='weekopen';open.textContent='⤢';open.title='Open week detail';
    open.addEventListener('click',()=>openWeek(wi,days));
    wr.appendChild(open);

    host.appendChild(wr);
  });

  renderLegend();
  const f=document.getElementById('freshness');
  f.textContent='Updated '+new Date().toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
  document.getElementById('foot').innerHTML=
    HOLIDAYS.length+' holiday records across <b>'+new Set(HOLIDAYS.map(h=>h.country)).size+
    '</b> countries · data from sheet <b>'+esc(CONFIG.SHEET_NAME)+'</b>';
}

function renderLegend(){
  const lg=document.getElementById('legend');
  const set=[...new Set(HOLIDAYS.map(h=>h.country))].sort();
  if(!set.length){lg.style.display='none';return}
  lg.style.display='flex';
  lg.innerHTML='<span class="ttl">'+set.length+' markets</span>'+
    set.map(c=>{
      const col=colorFor(c),code=codeFor(c),flag=flagFor(c);
      return '<span class="lg"><span class="sw" style="background:'+col+'"></span>'+
             '<span class="cd">'+code+'</span>'+flag+' '+esc(c)+'</span>';
    }).join('');
}

/* ===================== week detail ===================== */
function openWeek(wi,days){
  const today=ymd(new Date());
  document.getElementById('wkEyebrow').textContent='Week '+(wi+1);
  document.getElementById('wkTitle').textContent=fmtShort(days[0])+' – '+fmtLong(days[6]);
  const body=document.getElementById('wkBody');
  let html='';
  days.forEach(d=>{
    const occ=[];
    HOLIDAYS.forEach(h=>{ if(d>=h.start&&d<=h.end) occ.push(h); });
    occ.sort((a,b)=>a.country.localeCompare(b.country));
    const isToday=sameDay(d,today);
    html+='<div class="dayblock'+(isToday?' is-today':'')+'">';
    html+='<div class="dh"><span class="dnum">'+d.getDate()+' '+MON[d.getMonth()]+'</span>'+
          '<span class="dwd">'+DOW[d.getDay()]+'</span></div>';
    if(!occ.length){
      html+='<div class="emptyday">No holidays</div>';
    }else{
      occ.forEach(h=>{
        const span=h.span1=daysBetween(h.start,h.end)+1;
        let spanTxt='';
        if(span>1){
          const idx=daysBetween(h.start,d)+1;
          spanTxt=fmtShort(h.start)+'–'+fmtShort(h.end)+' · '+idx+'/'+span;
        }
        html+='<div class="hrow">'+
          '<span class="dot" style="background:'+h.color+'"></span>'+
          '<span class="cd" style="color:'+h.color+'">'+h.code+'</span>'+
          '<span class="cn">'+h.flag+' '+esc(h.country)+'</span>'+
          '<span class="hn">'+esc(h.name)+'</span>'+
          (spanTxt?'<span class="span">'+spanTxt+'</span>':'')+
          '</div>';
      });
    }
    html+='</div>';
  });
  body.innerHTML=html;
  document.getElementById('scrim').classList.add('show');
}
function closeWeek(){document.getElementById('scrim').classList.remove('show')}

/* ===================== tooltip ===================== */
const tip=document.getElementById('tip');
function attachTip(el,e){
  el.addEventListener('mousemove',ev=>{
    const codes=e.countries.map(c=>c.flag+' '+c.country).join(', ');
    const span=e.span>1?fmtShort(e.start)+' – '+fmtShort(e.end)+' ('+e.span+' days)':fmtLong(e.start);
    tip.innerHTML='<div class="tn">'+esc(e.name)+'</div>'+
      '<div class="tc">'+esc(codes)+'</div>'+
      '<div class="td">'+span+'</div>';
    tip.style.opacity='1';
    let x=ev.clientX+14, y=ev.clientY+14;
    const r=tip.getBoundingClientRect();
    if(x+r.width>innerWidth-10) x=ev.clientX-r.width-14;
    if(y+r.height>innerHeight-10) y=ev.clientY-r.height-14;
    tip.style.left=x+'px';tip.style.top=y+'px';
  });
  el.addEventListener('mouseleave',()=>{tip.style.opacity='0'});
}

/* ===================== util ===================== */
function esc(s){return (s||'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ===================== controls ===================== */
function go(delta){viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+delta,1);render()}
document.getElementById('prev').onclick=()=>go(-1);
document.getElementById('next').onclick=()=>go(1);
document.getElementById('today').onclick=()=>{const n=new Date();viewDate=new Date(n.getFullYear(),n.getMonth(),1);render()};
document.getElementById('jump').onchange=e=>{
  const m=e.target.value.match(/^(\d{4})-(\d{2})$/);
  if(m){viewDate=new Date(+m[1],+m[2]-1,1);render()}
};
document.getElementById('refresh').onclick=async()=>{
  const btn=document.getElementById('refresh');btn.textContent='↻ Loading…';
  try{await loadData();render()}catch(err){showError(err)}
  btn.textContent='↻ Refresh';
};
document.getElementById('wkClose').onclick=closeWeek;
document.getElementById('scrim').addEventListener('click',e=>{if(e.target.id==='scrim')closeWeek()});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeWeek();
  else if(e.key==='ArrowLeft'&&!document.getElementById('scrim').classList.contains('show'))go(-1);
  else if(e.key==='ArrowRight'&&!document.getElementById('scrim').classList.contains('show'))go(1);
});

function showError(err){
  document.getElementById('weeks').innerHTML=
    '<div class="state"><div class="big">Couldn\'t load the sheet</div>'+
    'Check that <code>SHEET_ID</code> / <code>SHEET_NAME</code> are correct and the sheet is shared as '+
    '<b>Anyone with the link → Viewer</b>.<br><br><code>'+esc(err.message||err)+'</code></div>';
  document.getElementById('legend').style.display='none';
}

/* ===================== init ===================== */
(async function init(){
  try{ await loadData(); render(); }
  catch(err){ showError(err); }
})();
</script>
